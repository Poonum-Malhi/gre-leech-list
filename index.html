<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Leech List — GRE Vocab Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --ink: #12161f;
  --card: #1b2230;
  --card-border: #2b3446;
  --parchment: #e9e5d8;
  --muted: #8b93a3;
  --gold: #c9a227;
  --leech-red: #b8564a;
  --healed-green: #6b9b7c;
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--ink); }

.leech-app {
  background: var(--ink);
  color: var(--parchment);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 40px 24px 60px;
}

.leech-header {
  max-width: 880px;
  margin: 0 auto 28px;
  border-bottom: 1px solid var(--card-border);
  padding-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 12px;
}

.leech-title {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 700;
  font-size: 34px;
  color: var(--parchment);
  margin: 0 0 4px;
  letter-spacing: -0.01em;
}

.leech-sub { color: var(--muted); font-size: 13.5px; margin: 0; }

.io-row { display: flex; gap: 8px; }

.io-btn {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}
.io-btn:hover { border-color: var(--gold); color: var(--gold); }

.stats-row {
  max-width: 880px;
  margin: 0 auto 24px;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.stat-pill {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.stat-pill b { font-family: var(--serif); font-size: 20px; color: var(--gold); font-style: normal; }
.stat-pill.due b { color: var(--leech-red); }
.stat-pill.mastered b { color: var(--healed-green); }

.board {
  max-width: 880px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.word-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s ease;
}
.word-card:hover { border-color: #3a4560; }

.leech-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-border); }
.leech-bar-fill { height: 100%; transition: width 0.3s ease; }

.word-status { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px; }
.word-status.due { color: var(--leech-red); }
.word-status.mastered { color: var(--healed-green); }
.word-status.scheduled { color: var(--gold); }

.word-headword { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--parchment); margin: 0 0 6px; }
.word-meaning { font-size: 13px; color: var(--muted); line-height: 1.4; margin: 0; }

.card-back { display: none; }
.word-card.flipped .card-front { display: none; }
.word-card.flipped .card-back { display: block; }

.mnemonic-box {
  font-size: 13px;
  line-height: 1.5;
  color: var(--parchment);
  background: rgba(201,162,39,0.08);
  border-left: 2px solid var(--gold);
  padding: 10px 12px;
  margin: 8px 0 14px;
  border-radius: 0 4px 4px 0;
}

.rate-row { display: flex; gap: 6px; }
.rate-btn {
  flex: 1;
  border: 1px solid var(--card-border);
  background: transparent;
  color: var(--parchment);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  padding: 8px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.rate-btn:hover { background: var(--card-border); }
.rate-btn.again:hover { background: rgba(184,86,74,0.25); border-color: var(--leech-red); }
.rate-btn.good:hover { background: rgba(107,155,124,0.25); border-color: var(--healed-green); }

.add-form {
  max-width: 880px;
  margin: 28px auto 0;
  background: var(--card);
  border: 1px dashed var(--card-border);
  border-radius: 10px;
  padding: 16px;
}
.add-form-title { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 10px; }
.add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.add-grid input, .add-form textarea {
  background: var(--ink);
  border: 1px solid var(--card-border);
  color: var(--parchment);
  font-family: var(--sans);
  font-size: 13px;
  padding: 9px 10px;
  border-radius: 6px;
  width: 100%;
}
.add-form textarea { min-height: 50px; resize: vertical; margin-bottom: 10px; }
.add-btn {
  background: var(--gold);
  color: var(--ink);
  border: none;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 13px;
  padding: 9px 18px;
  border-radius: 6px;
  cursor: pointer;
}
.add-btn:hover { opacity: 0.9; }

.empty-note { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 0; font-style: italic; font-family: var(--serif); }
.footer-note { max-width: 880px; margin: 24px auto 0; color: var(--muted); font-size: 11.5px; font-family: var(--mono); text-align: center; }
</style>
</head>
<body>
<div class="leech-app">
  <div class="leech-header">
    <div>
      <p class="leech-title">The Leech List</p>
      <p class="leech-sub">Words that keep biting until they're cured.</p>
    </div>
    <div class="io-row">
      <button class="io-btn" id="exportBtn">Export snapshot</button>
      <button class="io-btn" id="importBtn">Import snapshot</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div class="board" id="board"></div>

  <div class="add-form">
    <p class="add-form-title">Add a new leech</p>
    <div class="add-grid">
      <input type="text" id="newWord" placeholder="Word">
      <input type="text" id="newMeaning" placeholder="Short meaning">
    </div>
    <textarea id="newMnemonic" placeholder="Hinglish hook / mnemonic (optional)"></textarea>
    <button class="add-btn" id="addBtn">Add to list</button>
  </div>

  <p class="footer-note">Data lives in this browser's localStorage. Use "Export snapshot" to save a dated JSON file into /data and commit it for a permanent progress history.</p>
</div>

<script>
(function() {
  const STORAGE_KEY = 'gre-leech-list-data';

  const seedWords = [
    { word: 'Turgid', meaning: 'Pompous, overblown in style — NOT boring', mnemonic: 'Tu itna ghumaa-phiraake bol raha hai, dimaag turgid ho gaya. A turgid river is swollen with water — turgid writing is swollen with unnecessary words.' },
    { word: 'Impeccable', meaning: 'Flawless, without error', mnemonic: 'Im + peccable (Latin peccare = to sin) → literally "un-sin-nable." Nothing to peck/pick at.' },
    { word: 'Chastened', meaning: 'Subdued or humbled, especially after criticism', mnemonic: 'Itni daant padi ki bilkul chup-chaap, sharminda ho gaya. Chasten = daant kar seedha karna.' },
    { word: 'Diplomatic', meaning: 'Tactful; can also mean evasive/non-committal', mnemonic: 'Diplomat jaisi baat karta hai — seedha jawaab nahi deta. Tactfully vague, not just "polite."' },
    { word: 'Candid', meaning: 'Honest, direct, unfiltered', mnemonic: 'Candid camera mein jo dikhta hai woh real hota hai, bina filter ke. Seedha-saadha sach.' },
    { word: 'Comprehensive', meaning: 'Complete, covering everything', mnemonic: 'Com-PREHEND-sive — to comprehend fully, you need everything. Sab kuch cover, chhoti se chhoti cheez bhi.' },
    { word: 'Sidestepped', meaning: 'Avoided directly addressing something', mnemonic: 'Seedhe rasta se hatke, side se nikal gaya — avoided facing it head-on.' },
    { word: 'Indictment', meaning: 'Formal accusation; a charge of wrongdoing', mnemonic: 'Indictment = ilzaam, jaise court mein FIR jaisa charge. Silent "c" — sounds like "in-DITE-ment."' }
  ];

  function todayISO() { return new Date().toISOString().slice(0, 10); }

  function makeCard(seed) {
    return {
      word: seed.word,
      meaning: seed.meaning,
      mnemonic: seed.mnemonic || '',
      repetitions: 0,
      easeFactor: 2.5,
      interval: 0,
      dueDate: todayISO(),
      mastered: false
    };
  }

  let words = [];

  function loadWords() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      words = raw ? JSON.parse(raw) : null;
    } catch (e) { words = null; }
    if (!words || !words.length) {
      words = seedWords.map(makeCard);
      saveWords();
    }
    render();
  }

  function saveWords() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); }
    catch (e) { console.error('Save failed', e); }
  }

  function schedule(card, quality) {
    if (quality < 3) {
      card.repetitions = 0;
      card.interval = 1;
    } else {
      card.repetitions += 1;
      if (card.repetitions === 1) card.interval = 1;
      else if (card.repetitions === 2) card.interval = 3;
      else card.interval = Math.round(card.interval * card.easeFactor);
      card.easeFactor = Math.max(1.3, card.easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
    }
    card.mastered = card.repetitions >= 4 && quality >= 4;
    const due = new Date();
    due.setDate(due.getDate() + card.interval);
    card.dueDate = due.toISOString().slice(0, 10);
  }

  function isDue(card) { return card.dueDate <= todayISO(); }

  function render() {
    const statsRow = document.getElementById('statsRow');
    const board = document.getElementById('board');
    const dueCount = words.filter(isDue).length;
    const masteredCount = words.filter(w => w.mastered).length;

    statsRow.innerHTML = `
      <div class="stat-pill"><b>${words.length}</b> total words</div>
      <div class="stat-pill due"><b>${dueCount}</b> due today</div>
      <div class="stat-pill mastered"><b>${masteredCount}</b> mastered</div>
    `;

    if (!words.length) {
      board.innerHTML = '<div class="empty-note">No leeches yet — add your first word below.</div>';
      return;
    }

    board.innerHTML = '';
    words.forEach((card) => {
      const due = isDue(card);
      const statusLabel = card.mastered ? 'Mastered' : (due ? 'Due today' : `Due ${card.dueDate}`);
      const statusClass = card.mastered ? 'mastered' : (due ? 'due' : 'scheduled');
      const fillPct = Math.min(100, (card.repetitions / 4) * 100);
      const fillColor = card.mastered ? 'var(--healed-green)' : (due ? 'var(--leech-red)' : 'var(--gold)');

      const el = document.createElement('div');
      el.className = 'word-card';
      el.innerHTML = `
        <div class="leech-bar"><div class="leech-bar-fill" style="width:${fillPct}%; background:${fillColor};"></div></div>
        <div class="card-front">
          <div class="word-status ${statusClass}">${statusLabel}</div>
          <p class="word-headword">${card.word}</p>
          <p class="word-meaning">Tap to test yourself</p>
        </div>
        <div class="card-back">
          <div class="word-status ${statusClass}">${statusLabel}</div>
          <p class="word-headword">${card.word}</p>
          <p class="word-meaning" style="margin-bottom:8px;"><strong>${card.meaning}</strong></p>
          ${card.mnemonic ? `<div class="mnemonic-box">${card.mnemonic}</div>` : ''}
          <div class="rate-row">
            <button class="rate-btn again" data-q="0">Again</button>
            <button class="rate-btn" data-q="3">Hard</button>
            <button class="rate-btn good" data-q="4">Good</button>
            <button class="rate-btn" data-q="5">Easy</button>
          </div>
        </div>
      `;

      el.querySelector('.card-front').addEventListener('click', () => el.classList.add('flipped'));
      el.querySelectorAll('.rate-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          schedule(card, parseInt(btn.dataset.q, 10));
          saveWords();
          render();
        });
      });
      board.appendChild(el);
    });
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const wordInput = document.getElementById('newWord');
    const meaningInput = document.getElementById('newMeaning');
    const mnemonicInput = document.getElementById('newMnemonic');
    const word = wordInput.value.trim();
    const meaning = meaningInput.value.trim();
    const mnemonic = mnemonicInput.value.trim();
    if (!word || !meaning) return;
    words.push(makeCard({ word, meaning, mnemonic }));
    saveWords();
    render();
    wordInput.value = ''; meaningInput.value = ''; mnemonicInput.value = '';
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `leechlist-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const imported = JSON.parse(evt.target.result);
        if (Array.isArray(imported)) {
          words = imported;
          saveWords();
          render();
        }
      } catch (err) { alert('Could not read that file — make sure it is a valid exported JSON snapshot.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  loadWords();
})();
</script>
</body>
</html>
